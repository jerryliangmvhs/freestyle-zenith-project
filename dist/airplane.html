<body style = "position: relative;">
    <style>
      @keyframes slideFromTop{
        from{
          transform: translateY(-100%);
          opacity: 0;
        }
      }
      @keyframes fadeIn{
        0%, 50%{
          opacity: 0;
        }
      }
      body { margin: 0; width: 100%; }
      .title{
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        margin-top: 20px;
        color: white;
        font-family: 'Courier New', Courier, monospace;
        width: 100vw;
        animation: slideFromTop 3s ease;
      }
      .exhibit{
        width: 100% !important;
        height: 100% !important;
      }
      .buttonWrapper{
        position: absolute;
        width: 100%;
        display: flex;
        justify-content: center;
        top: 85%;
        animation: fadeIn 2s ease;
      }
      button{
        margin: 0;
        background: none;
        color: white;
        font-family: 'Courier New', Courier, monospace;
        border: 5px solid white;
        padding: 20px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: background-color 0.25s ease;
      }
      button:hover{
        background-color: white;
        color: #90cbf0;
      }
      @media(max-width: 768px){
        .title{
            margin-top: 100px;
        }
      }
    </style>
    <div class = "title">
        <h1 class = "name" style = "margin: 10px; text-align: center; font-size: 20px; font-weight: 900 !important;">Jerry Liang</h1>
        <p class = "description" style = "margin: 10px; text-align: center; font-weight: 500;">3D Landing Page, click on the plane and drag to test it!</p>
    </div>
    <div class = "buttonWrapper"><button onclick = "location.assign('https://jerryliangportfolio.com/')">Start Flying</button></div>

<canvas id = "exhibit" class = "exhibit"></canvas>
