<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.png">
     <meta property="og:site_name" content="Jerry's Zenith Project" />
    <meta property="og:title" content="Jerry's Zenith Project" />
    <meta property="twitter:title" content="Jerry's Zenith Project" />
    <meta property="og:url" content="http://zenith.jerryliangportfolio.com/" />
    <meta property="og:description" content="Check out my Freestyle Academy Senior Zenith Project!" />
    
    <meta property="og:image" content="http://zenith.jerryliangportfolio.com/favicon.png"/>
    <meta property="og:image:secure_url" content="http://zenith.jerryliangportfolio.com/favicon.png"/>
    <meta property="twitter:image" content="http://zenith.jerryliangportfolio.com/favicon.png"/>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <title>Jerry's House</title>
</head>
<style>
    @font-face{
        font-family: debug-font;
        src: url("Minecraft.otf");
    }
    @keyframes fade-in{
        from{
            opacity: 0;
        }
    }
    body { margin: 0; position: relative; overflow-x: hidden; background: rgb(248, 181, 163);}
    .exhibit{
       width: 100% !important;
       height: 100% !important;
       animation: fade-in 1s ease;
    }
    p{
        margin: 0;
    }
    .debug{
        color: white;
        margin: 20px;
        font-weight: 900;
        pointer-events: none;
        font-family: debug-font;
        position: absolute;
        top: 0;
        left: 0;
    }
    #app{
        display: flex;
        justify-content: space-between;
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 999;
    }
    .icons{
        display: flex;
        align-items: center;
        margin: 20px;
        position: absolute;
        top: 0;
        right: 0;
    }
    .icons > img{
        width: 50px;
        margin: 10px;
        cursor: pointer;
        transition: transform 0.25s ease;
    }
    .icons > img:hover{
        transform: translateY(-10px);
    }
</style>
<body>
    <div id = "app">
        <div class = "debug">
            <p id = "cameraXInfo"></p>
            <p id = "cameraYInfo"></p>
            <p id = "cameraZInfo"></p>
            <p id = "cameraPitchInfo"></p>
            <p id = "cameraYawInfo"></p>
            <p id = "cameraRollInfo"></p>
        </div>
        <div class = "icons">
            <img class = "website" alt = "home logo" src = "home.png" onclick = "location.assign('https://freestyleacademy.rocks/~JerryL/')">
            <img class = "youtube" alt = "youtube logo" src = "youtube.png" onclick = "location.assign('https://www.youtube.com/@small_j1337')">
            <img class = "instagram" alt = "instagram logo" src = "instagram.png" onclick = "location.assign('https://www.instagram.com/small_j1337/')">
        </div>
    </div>
    <canvas id = "exhibit" class = "exhibit"></canvas>
    <script type="module" src="/main.js"></script>
</body>
</html>
